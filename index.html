<!-- Virtual Joystick -->
<div id="joystick-zone">
    <div id="joystick-knob"></div>
</div>

<!-- Debug Console -->
<div id="debug-console"
    style="position: absolute; top: 50px; left: 10px; color: yellow; font-family: monospace; pointer-events: none; z-index: 300; max-width: 90%;">
</div>

<script>
    // Redirect console.log/error to screen for mobile debugging
    const debugConsole = document.getElementById('debug-console');
    const originalLog = console.log;
    const originalError = console.error;

    function logToScreen(msg, color = 'yellow') {
        const line = document.createElement('div');
        line.textContent = msg;
        line.style.color = color;
        debugConsole.appendChild(line);
        // Keep only last 5 lines
        while (debugConsole.children.length > 5) {
            debugConsole.removeChild(debugConsole.firstChild);
        }
    }

    console.log = function (...args) {
        originalLog.apply(console, args);
        logToScreen(args.join(' '));
    };

    console.error = function (...args) {
        originalError.apply(console, args);
        logToScreen(args.join(' '), 'red');
    };

    window.onerror = function (msg, source, lineno, colno, error) {
        logToScreen(`Error: ${msg}`, 'red');
    };
</script>

<script type="module" src="main.js"></script>
